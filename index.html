<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Carteras</title>
<meta name="theme-color" content="#f0f0f0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Carteras">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #c8c8cc;
  --surface: #e8e8ec;
  --surface2: #d8d8de;
  --border: #b0b0bc;
  --text: #1a1a2e;
  --muted: #707088;
  --green: #16a34a;
  --red: #dc2626;
  --green-dim: rgba(22,163,74,0.10);
  --red-dim: rgba(220,38,38,0.10);
  --accent: #16a34a;
  --font: 'IBM Plex Mono', monospace;
  --font-num: 'Times New Roman', Times, serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; padding:0 0 80px; max-width:640px; margin:0 auto; }

/* ── HEADER ── */
.header { padding:20px 16px 14px; border-bottom:1px solid var(--border); }
.header-top { display:flex; justify-content:space-between; align-items:flex-start; }
.header h1 { font-family:var(--font-num); font-size:1.6rem; font-weight:700; letter-spacing:-0.02em; }
.status-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); margin-top:6px; }
.status-dot.ok { background:var(--green); }
.status-dot.err { background:var(--red); }
.status-txt { font-size:0.58rem; color:var(--muted); margin-top:4px; }

/* ── CARTERA SWITCHER ── */
.cartera-switch { display:flex; gap:0; margin:14px 16px 0; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.cartera-btn { flex:1; background:none; border:none; color:var(--muted); font-family:var(--font); font-size:0.72rem; padding:10px 8px; cursor:pointer; transition:all 0.15s; letter-spacing:0.04em; text-align:center; }
.cartera-btn.active { background:var(--surface2); color:var(--text); }
.cartera-btn span { display:block; font-size:0.55rem; margin-top:2px; }

/* ── RESUMEN ── */
.resumen { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:var(--border); margin:14px 16px 0; border-radius:10px; overflow:hidden; }
.resumen-item { background:var(--surface); padding:10px 12px; }
.resumen-item .lbl { font-size:0.52rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:4px; }
.resumen-item .val { font-family:var(--font-num); font-size:1.05rem; font-weight:700; }
.resumen-item.benef .val { color:var(--green); }
.resumen-item.perd .val { color:var(--red); }
.resumen-item.wide { grid-column:span 2; }

/* ── ACCIONES BTN ── */
.acciones { display:flex; gap:8px; margin:12px 16px 0; flex-wrap:wrap; }
.btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); font-family:var(--font); font-size:0.68rem; padding:9px 12px; border-radius:8px; cursor:pointer; transition:all 0.15s; letter-spacing:0.03em; white-space:nowrap; }
.btn:active { opacity:0.7; transform:scale(0.97); }
.btn.primary { background:var(--green); color:#ffffff; border-color:var(--green); font-weight:500; }
.btn.save { background:#dcfce7; color:#16a34a; border-color:#bbf7d0; }

/* ── TABS ── */
.tabs { display:flex; margin:16px 16px 0; border-bottom:1px solid var(--border); gap:0; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.tab { background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); font-family:var(--font); font-size:0.6rem; padding:7px 14px 9px; cursor:pointer; white-space:nowrap; margin-bottom:-1px; letter-spacing:0.07em; text-transform:uppercase; }
.tab.active { color:var(--text); border-color:var(--accent); }

/* ── POSICIONES CARDS ── */
.pos-lista { margin:12px 16px 0; display:flex; flex-direction:column; gap:8px; }
.pos-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
.pos-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.pos-card-nombre { font-family:var(--font-num); font-size:0.95rem; font-weight:700; color:var(--text); }
.pos-card-ticker { font-size:0.58rem; color:var(--muted); margin-top:2px; }
.pos-card-fila { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.pos-card-fila + .pos-card-fila { margin-top:6px; padding-top:6px; border-top:1px solid var(--border); }
.pos-campo .lbl { font-size:0.5rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:2px; }
.pos-campo .val { font-family:var(--font-num); font-size:0.82rem; font-weight:700; color:var(--text); }
.pos-campo .val.pos { color:var(--green); }
.pos-campo .val.neg { color:var(--red); }
.pos-total { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin:8px 16px 0; }
.pos-total-fila { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.pos-total .lbl { font-size:0.5rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:2px; }
.pos-total .val { font-family:var(--font-num); font-size:0.9rem; font-weight:700; color:var(--text); }
.pos-total .val.pos { color:var(--green); }
.pos-total .val.neg { color:var(--red); }
.num { font-family:var(--font-num); font-size:0.82rem; font-weight:700; }
.pos { color:var(--green); }
.neg { color:var(--red); }
.pill { display:inline-block; padding:3px 8px; border-radius:20px; font-size:0.65rem; font-weight:500; white-space:nowrap; }
.pill.pos { background:var(--green-dim); color:var(--green); }
.pill.neg { background:var(--red-dim); color:var(--red); }
.tabla tfoot td { padding:10px 4px; border-top:2px solid var(--border); font-family:var(--font-num); font-weight:700; font-size:0.78rem; text-align:right; color:var(--text); }
.tabla tfoot td:first-child { text-align:left; font-size:0.55rem; color:var(--muted); font-family:var(--font); font-weight:400; padding-left:0; }

/* ── HISTORIAL / REALIZADAS ── */
.lista { margin:12px 16px 0; display:flex; flex-direction:column; gap:1px; border-radius:10px; overflow:hidden; background:var(--border); }
.lista-row { background:var(--surface); padding:11px 14px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
.lista-row-left .fecha { font-size:0.65rem; font-weight:500; }
.lista-row-left .sub { font-size:0.58rem; color:var(--muted); margin-top:2px; }
.lista-row-right { text-align:right; }
.lista-row-right .val-main { font-family:var(--font-num); font-size:0.9rem; font-weight:700; }
.empty { text-align:center; color:var(--muted); font-size:0.72rem; padding:32px 16px; border:1px solid var(--border); border-radius:10px; line-height:1.7; margin:12px 16px 0; }

/* ── RENTABILIDAD ── */
.ic-resumen { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); margin:12px 16px 0; border-radius:10px; overflow:hidden; }
.ic-item { background:var(--surface); padding:10px 12px; }
.ic-item .lbl { font-size:0.52rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px; }
.ic-item .val { font-family:var(--font-num); font-size:1rem; font-weight:700; }
.rent-wrap { margin:12px 16px 0; overflow-x:auto; }
.rent-matrix { width:100%; border-collapse:collapse; font-size:0.68rem; }
.rent-matrix th { font-size:0.5rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; padding:5px 6px; text-align:center; border-bottom:1px solid var(--border); white-space:nowrap; background:var(--surface); }
.rent-matrix th:first-child { text-align:left; }
.rent-matrix td { padding:6px 5px; text-align:center; font-family:var(--font-num); font-weight:700; font-size:0.72rem; border-bottom:1px solid var(--border); white-space:nowrap; }
.rent-matrix td:first-child { text-align:left; font-family:var(--font); font-weight:400; font-size:0.65rem; color:var(--muted); padding-left:0; }
.rent-matrix td.pos { color:var(--green); }
.rent-matrix td.neg { color:var(--red); }
.rent-matrix td.anual { font-size:0.78rem; border-left:2px solid var(--border); }
.rent-matrix td.vacio { color:var(--muted); font-weight:400; font-size:0.62rem; }
.rent-matrix tr:last-child td { border-bottom:none; }

/* ── MODALES ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:9999; align-items:flex-end; justify-content:center; }
.overlay.open { display:flex; }
.modal { background:var(--surface); border-radius:18px 18px 0 0; padding:20px 16px 40px; width:100%; max-height:88vh; overflow-y:auto; border-top:1px solid var(--border); box-shadow:0 -4px 24px rgba(0,0,0,0.12); }
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 18px; }
.modal h2 { font-family:var(--font-num); font-size:1.15rem; color:var(--text); margin-bottom:18px; }
.form-row { margin-bottom:12px; }
label { display:block; font-size:0.58rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:5px; }
input, select { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:var(--font); font-size:0.82rem; padding:11px 12px; border-radius:8px; outline:none; -webkit-appearance:none; }
input:focus, select:focus { border-color:var(--accent); }
.form-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.modal-actions { display:flex; flex-direction:column; gap:8px; margin-top:20px; }
.modal-actions .btn { padding:13px; text-align:center; font-size:0.78rem; border-radius:10px; width:100%; }
.hint { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:8px; padding:10px 14px; font-size:0.65rem; color:#166534; margin-bottom:14px; line-height:1.6; }
.note { font-size:0.58rem; color:var(--muted); margin:20px 16px 0; text-align:center; line-height:1.7; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1 id="header-titulo">Carteras</h1>
    <div>
      <div class="status-dot" id="status-dot"></div>
    </div>
  </div>
  <div class="status-txt" id="status-txt">Iniciando...</div>
</div>

<!-- SELECTOR DE CARTERA -->
<div class="cartera-switch">
  <button class="cartera-btn active" data-cartera="0" id="btn-cartera-0">
    Cartera Jaume
    <span id="switch-val-0">—</span>
  </button>
  <button class="cartera-btn" data-cartera="1" id="btn-cartera-1">
    Cartera Mari
    <span id="switch-val-1">—</span>
  </button>
</div>

<!-- RESUMEN -->
<div class="resumen" id="resumen"></div>

<!-- BOTONES -->
<div class="acciones">
  <button class="btn" id="btn-auto">🔄 Actualizar</button>
  <button class="btn" id="btn-actualizar">✏️ Manual</button>
  <button class="btn" id="btn-aportacion">＋ Operación</button>
  <button class="btn primary" id="btn-snapshot">📸 Snapshot</button>
  <button class="btn save" id="btn-descargar">💾 Guardar</button>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" data-tab="posiciones">Posiciones</button>
  <button class="tab" data-tab="rentabilidad">Rentabilidad</button>
  <button class="tab" data-tab="historial">Historial</button>
  <button class="tab" data-tab="realizadas">Realizados</button>
</div>

<!-- TAB POSICIONES -->
<div id="tab-posiciones">
  <div class="pos-lista" id="pos-lista"></div>
  <div class="pos-total" id="pos-total" style="display:none"></div>
</div>

<!-- TAB RENTABILIDAD -->
<div id="tab-rentabilidad" style="display:none">
  <div class="ic-resumen" id="ic-resumen"></div>
  <div id="rent-matriz-wrap"></div>
</div>

<!-- TAB HISTORIAL -->
<div id="tab-historial" style="display:none">
  <div id="historial-content"></div>
</div>

<!-- TAB REALIZADAS -->
<div id="tab-realizadas" style="display:none">
  <div id="realizadas-content"></div>
</div>

<div class="note">💾 Pulsa Guardar tras cada cambio para conservar los datos.</div>

<!-- MODAL ACTUALIZAR PRECIOS -->
<div class="overlay" id="overlay-actualizar">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>✏️ Actualizar precios</h2>
    <div class="hint">💡 Tras guardar pulsa 💾 Guardar para conservar los cambios.</div>
    <div id="precio-fields"></div>
    <div class="form-row"><label>Fecha</label><input type="date" id="np-fecha"></div>
    <div class="modal-actions">
      <button class="btn primary" id="btn-guardar-precios">Guardar</button>
      <button class="btn" id="btn-cancelar-actualizar">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL OPERACIÓN -->
<div class="overlay" id="overlay-aportacion">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>＋ Operación</h2>
    <div class="form-row">
      <label>Tipo</label>
      <select id="op-tipo">
        <option value="compra">Compra (nueva o ampliación)</option>
        <option value="venta">Venta (total o parcial)</option>
      </select>
    </div>
    <div id="op-compra-fields">
      <div class="form-grid2">
        <div class="form-row"><label>Ticker</label><input id="op-ticker" placeholder="e.g. AAPL"></div>
        <div class="form-row"><label>Nombre</label><input id="op-nombre" placeholder="Apple Inc."></div>
      </div>
      <div class="form-row" id="op-yahoo-row">
        <label>Símbolo Yahoo Finance <span style="font-size:0.5rem;color:var(--muted)">(precios auto)</span></label>
        <input id="op-yahoo" placeholder="e.g. AAPL · GRE.MC">
        <div style="font-size:0.57rem;color:var(--muted);margin-top:4px">Búscalo en <a href="https://finance.yahoo.com" target="_blank" style="color:var(--green)">finance.yahoo.com</a></div>
      </div>
      <div class="form-grid2">
        <div class="form-row"><label>Nº acciones</label><input id="op-acciones" type="number" placeholder="0"></div>
        <div class="form-row"><label>Precio (€)</label><input id="op-precio" type="number" step="0.01" placeholder="0.00"></div>
      </div>
      <div class="form-grid2">
        <div class="form-row"><label>Comisión (€)</label><input id="op-comision" type="number" step="0.01" value="0"></div>
        <div class="form-row"><label>Fecha</label><input id="op-fecha" type="date"></div>
      </div>
    </div>
    <div id="op-venta-fields" style="display:none">
      <div class="form-row"><label>Ticker a vender</label><select id="op-venta-ticker"></select></div>
      <div class="form-grid2">
        <div class="form-row"><label>Nº acciones</label><input id="op-venta-acc" type="number" placeholder="0"></div>
        <div class="form-row"><label>Precio venta (€)</label><input id="op-venta-precio" type="number" step="0.01" placeholder="0.00"></div>
      </div>
      <div class="form-grid2">
        <div class="form-row"><label>Comisión (€)</label><input id="op-venta-com" type="number" step="0.01" value="0"></div>
        <div class="form-row"><label>Fecha</label><input id="op-venta-fecha" type="date"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn primary" id="btn-confirmar-op">Confirmar</button>
      <button class="btn" id="btn-cancelar-aportacion">Cancelar</button>
    </div>
  </div>
</div>

<script id="datos-cartera">
var STATE = {
  "carteras": [
    {
      "nombre": "Cartera Jaume",
      "posiciones": [
        {"ticker":"ABEA.XETRA","nombre":"Alphabet (Google)","acciones":40,"precioMedio":249.6,"precioActual":256.1,"fechaCompra":"2026-03-01"},
        {"ticker":"ABRX.BR","nombre":"argenx SE","acciones":2,"precioMedio":637.6,"precioActual":647.2,"fechaCompra":"2026-03-01"},
        {"ticker":"GRE.MC","nombre":"Grenergy Renovables","acciones":52,"precioMedio":115.4,"precioActual":119,"fechaCompra":"2026-03-01"},
        {"ticker":"LOG.MC","nombre":"Logista","acciones":244,"precioMedio":32.76,"precioActual":32.96,"fechaCompra":"2026-03-01"},
        {"ticker":"NVD.TRADEGATE","nombre":"NVIDIA","acciones":19,"precioMedio":151.47,"precioActual":153.74,"fechaCompra":"2026-03-01"},
        {"ticker":"SGLD.AS","nombre":"Invesco Physical Gold ETC","acciones":14,"precioMedio":392.41,"precioActual":389.31,"fechaCompra":"2026-03-01"},
        {"ticker":"XU10.XETRA","nombre":"Xtrackers US Treasuries 7-10","acciones":592,"precioMedio":26.98,"precioActual":27,"fechaCompra":"2026-03-01"}
      ],
      "comisionesTotales": 30,
      "historial": [],
      "realizadas": [],
      "ultimaActualizacion": "2026-04-05"
    },
    {
      "nombre": "Cartera Mari",
      "posiciones": [],
      "comisionesTotales": 0,
      "historial": [],
      "realizadas": [],
      "ultimaActualizacion": "2026-04-05"
    }
  ],
  "yahooMap": {
    "ABEA.XETRA":    "ABEA.DE",
    "ABRX.BR":       "ARGNX.BR",
    "GRE.MC":        "GRE.MC",
    "LOG.MC":        "LOG.MC",
    "NVD.TRADEGATE": "NVD.DE",
    "SGLD.AS":       "SGLD.AS",
    "XU10.XETRA":    "XU10.DE"
  }
};
</script>

<script>
// ── ESTADO ──
var state = JSON.parse(JSON.stringify(STATE));
var carteraActiva = 0;

const f  = (n, d=2) => typeof n==='number' ? n.toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d}) : '—';
const fs = (n, d=2) => typeof n==='number' ? (n>=0?'+':'')+f(n,d) : '—';

function cartera() { return state.carteras[carteraActiva]; }

function calcTotales(c) {
  let inv=0, act=0;
  c.posiciones.forEach(p => { inv+=p.acciones*p.precioMedio; act+=p.acciones*p.precioActual; });
  const coste=inv+c.comisionesTotales, benef=act-coste, pct=coste>0?(benef/coste)*100:0;
  return {inv, act, coste, benef, pct};
}

// ── RENDER RESUMEN ──
function renderResumen() {
  const c = cartera();
  const {coste, act, benef, pct} = calcTotales(c);
  const pos = benef >= 0;
  document.getElementById('resumen').innerHTML = `
    <div class="resumen-item"><div class="lbl">Coste</div><div class="val">${f(coste)} €</div></div>
    <div class="resumen-item"><div class="lbl">Valor actual</div><div class="val">${f(act)} €</div></div>
    <div class="resumen-item ${pos?'benef':'perd'}"><div class="lbl">Rentab.</div><div class="val">${fs(pct,2)}%</div></div>
    <div class="resumen-item wide ${pos?'benef':'perd'}"><div class="lbl">Beneficio / Pérdida</div><div class="val">${fs(benef)} €</div></div>
    <div class="resumen-item"><div class="lbl">Posiciones</div><div class="val">${c.posiciones.length}</div></div>
  `;
  // Actualizar switch
  state.carteras.forEach((cr, i) => {
    const t = calcTotales(cr);
    const p = t.benef >= 0;
    const el = document.getElementById('switch-val-'+i);
    if (el) {
      el.textContent = f(t.act) + ' €';
      el.style.color = cr.posiciones.length ? (p ? 'var(--green)' : 'var(--red)') : 'var(--muted)';
    }
  });
  document.getElementById('header-titulo').textContent = c.nombre;
}

// ── RENDER POSICIONES ──
function renderPosiciones() {
  const c = cartera();
  const lista = document.getElementById('pos-lista');
  const total = document.getElementById('pos-total');
  if (c.posiciones.length === 0) {
    lista.innerHTML = '<div class="empty">Sin posiciones. Pulsa ＋ Operación para añadir.</div>';
    total.style.display = 'none';
    return;
  }
  let totInv=0, totAct=0;
  lista.innerHTML = c.posiciones.map(p => {
    const inv = p.acciones * p.precioMedio;
    const act = p.acciones * p.precioActual;
    const ben = act - inv;
    const pct = inv > 0 ? (ben/inv)*100 : 0;
    const com = p.comision || 0;
    totInv += inv; totAct += act;
    const pos = ben >= 0;
    return `<div class="pos-card">
      <div class="pos-card-header">
        <div>
          <div class="pos-card-nombre">${p.nombre}</div>
          <div class="pos-card-ticker">${p.ticker}</div>
        </div>
        <span class="pill ${pos?'pos':'neg'}">${fs(pct,1)}%</span>
      </div>
      <div class="pos-card-fila">
        <div class="pos-campo"><div class="lbl">Acciones</div><div class="val">${p.acciones}</div></div>
        <div class="pos-campo"><div class="lbl">P. Compra</div><div class="val">${f(p.precioMedio)}</div></div>
        <div class="pos-campo"><div class="lbl">P. Actual</div><div class="val">${f(p.precioActual)}</div></div>
        <div class="pos-campo"><div class="lbl">Comisión</div><div class="val">${com>0?f(com):'—'}</div></div>
      </div>
      <div class="pos-card-fila">
        <div class="pos-campo"><div class="lbl">Inversión</div><div class="val">${f(inv)}</div></div>
        <div class="pos-campo"><div class="lbl">Valor act.</div><div class="val ${pos?'pos':'neg'}">${f(act)}</div></div>
        <div class="pos-campo" style="grid-column:span 2"><div class="lbl">Benef / Pérdida</div><div class="val ${pos?'pos':'neg'}">${fs(ben)} €</div></div>
      </div>
    </div>`;
  }).join('');
  const totCoste = totInv + c.comisionesTotales;
  const totBen = totAct - totCoste;
  const totPct = totCoste > 0 ? (totBen/totCoste)*100 : 0;
  const pos = totBen >= 0;
  total.style.display = 'block';
  total.innerHTML = `
    <div style="font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px">Total cartera</div>
    <div class="pos-total-fila">
      <div><div class="lbl">Coste</div><div class="val">${f(totCoste)}</div></div>
      <div><div class="lbl">Valor act.</div><div class="val ${pos?'pos':'neg'}">${f(totAct)}</div></div>
      <div><div class="lbl">Benef/Pérd</div><div class="val ${pos?'pos':'neg'}">${fs(totBen)}</div></div>
      <div><div class="lbl">Rentab.</div><div style="margin-top:2px"><span class="pill ${pos?'pos':'neg'}">${fs(totPct,1)}%</span></div></div>
    </div>`;
}

// ── RENDER RENTABILIDAD ──
function renderRentabilidad() {
  const c = cartera();
  const {coste, act, benef, pct} = calcTotales(c);
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  // Construir mapa año→mes→rentabilidad
  const snaps = [...c.historial].sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const mesActual = c.ultimaActualizacion.slice(0,7);
  const allSnaps = [...snaps];
  if (!allSnaps.find(s=>s.fecha.slice(0,7)===mesActual)) {
    allSnaps.push({fecha:c.ultimaActualizacion, coste, valor:act, benef, pct, virtual:true});
  }

  // Calcular rentabilidad mensual de cada snapshot
  let valorAnterior = null, acumIC = 1;
  const rentMap = {}; // { '2026-03': 1.0, ... }
  allSnaps.forEach((s,i) => {
    let rentMes = null;
    if (valorAnterior !== null && valorAnterior > 0) {
      rentMes = (s.valor/valorAnterior - 1)*100;
    } else if (i===0) {
      rentMes = s.coste > 0 ? (s.valor/s.coste - 1)*100 : 0;
    }
    if (rentMes !== null) {
      acumIC *= (1+rentMes/100);
      rentMap[s.fecha.slice(0,7)] = rentMes;
    }
    valorAnterior = s.valor;
  });

  const n = allSnaps.length;
  const rentAcum = (acumIC-1)*100;
  const rentAnual = n>=2 ? (Math.pow(acumIC, 12/n)-1)*100 : null;
  const fechaInicio = new Date(c.posiciones[0]?.fechaCompra||c.ultimaActualizacion);
  const numMeses = Math.max(1, Math.round((new Date(c.ultimaActualizacion)-fechaInicio)/(1000*60*60*24*30.44)));

  // Resumen IC
  document.getElementById('ic-resumen').innerHTML = `
    <div class="ic-item"><div class="lbl">Rent. acumulada</div><div class="val ${rentAcum>=0?'pos':'neg'}">${fs(rentAcum,2)}%</div></div>
    <div class="ic-item"><div class="lbl">Rent. anualizada</div><div class="val ${!rentAnual||rentAnual>=0?'pos':'neg'}">${rentAnual!==null?fs(rentAnual,2)+'%':'—'}</div></div>
    <div class="ic-item"><div class="lbl">Meses</div><div class="val">${numMeses}</div></div>
    <div class="ic-item"><div class="lbl">Beneficio neto</div><div class="val ${benef>=0?'pos':'neg'}">${fs(benef)} €</div></div>
  `;

  if (allSnaps.length === 0) {
    document.getElementById('rent-matriz-wrap').innerHTML = '<div class="empty">Sin snapshots aún.<br>Pulsa 📸 Snapshot al cerrar cada mes.</div>';
    return;
  }

  // Obtener años únicos
  const anios = [...new Set(allSnaps.map(s=>s.fecha.slice(0,4)))].sort();

  // Construir tabla matriz
  let html = '<div class="rent-wrap"><table class="rent-matrix"><thead><tr>';
  html += '<th>Año</th>';
  meses.forEach(m => html += `<th>${m}</th>`);
  html += '<th>Anual</th></tr></thead><tbody>';

  anios.forEach(anio => {
    // Calcular rentabilidad anual con interés compuesto
    let acumAnio = 1;
    let tieneDatos = false;
    meses.forEach((m, i) => {
      const key = anio+'-'+(String(i+1).padStart(2,'0'));
      if (rentMap[key] !== undefined) {
        acumAnio *= (1+rentMap[key]/100);
        tieneDatos = true;
      }
    });
    const rentAnioVal = tieneDatos ? (acumAnio-1)*100 : null;
    const posAnio = rentAnioVal === null || rentAnioVal >= 0;

    html += `<tr>`;
    html += `<td>${anio}</td>`;
    meses.forEach((m, i) => {
      const key = anio+'-'+(String(i+1).padStart(2,'0'));
      const r = rentMap[key];
      if (r !== undefined) {
        const pos = r >= 0;
        html += `<td class="${pos?'pos':'neg'}">${fs(r,2)}%</td>`;
      } else {
        html += `<td class="vacio">—</td>`;
      }
    });
    html += `<td class="anual ${posAnio?'pos':'neg'}">${rentAnioVal!==null?fs(rentAnioVal,2)+'%':'—'}</td>`;
    html += `</tr>`;
  });

  html += '</tbody></table></div>';
  html += '<div style="font-size:0.57rem;color:var(--muted);margin:8px 16px 0;line-height:1.6">Rentabilidades calculadas con interés compuesto mensual encadenado · ★ mes actual sin snapshot confirmado</div>';
  document.getElementById('rent-matriz-wrap').innerHTML = html;
}

// ── RENDER HISTORIAL ──
function renderHistorial() {
  const c = cartera();
  const el = document.getElementById('historial-content');
  if (!c.historial.length) {
    el.innerHTML = '<div class="empty">Sin snapshots.<br>Pulsa 📸 Snapshot al cerrar cada mes.</div>'; return;
  }
  el.innerHTML = '<div class="lista">' + [...c.historial].reverse().map(s => {
    const pos = s.benef >= 0;
    return `<div class="lista-row">
      <div class="lista-row-left"><div class="fecha">${s.fecha}</div><div class="sub">Coste: ${f(s.coste)} € · Valor: ${f(s.valor)} €</div></div>
      <div class="lista-row-right"><div class="val-main ${pos?'pos':'neg'}">${fs(s.benef)} €</div><span class="pill ${pos?'pos':'neg'}">${fs(s.pct,1)}%</span></div>
    </div>`;
  }).join('') + '</div>';
}

// ── RENDER REALIZADAS ──
function renderRealizadas() {
  const c = cartera();
  const el = document.getElementById('realizadas-content');
  if (!c.realizadas.length) {
    el.innerHTML = '<div class="empty">Sin ventas registradas.</div>'; return;
  }
  let total = 0;
  const items = c.realizadas.map(v => {
    const pos = v.benefNeto >= 0; total += v.benefNeto;
    return `<div class="lista-row">
      <div class="lista-row-left"><div class="fecha">${v.ticker} <span style="font-size:0.6rem;color:var(--muted)">${v.nombre}</span></div><div class="sub">${v.fecha} · ${v.acciones} acc · ${f(v.precioCompra)} → ${f(v.precioVenta)} €</div></div>
      <div class="lista-row-right"><div class="val-main ${pos?'pos':'neg'}">${fs(v.benefNeto)} €</div></div>
    </div>`;
  }).join('');
  const posT = total >= 0;
  el.innerHTML = '<div class="lista">'+items+'</div><div class="lista" style="margin-top:8px"><div class="lista-row"><div class="lista-row-left"><div class="fecha">Total realizados</div></div><div class="lista-row-right"><div class="val-main '+( posT?'pos':'neg')+'">'+fs(total)+' €</div></div></div></div>';
}

function renderAll() {
  renderResumen();
  renderPosiciones();
  renderRentabilidad();
  renderHistorial();
  renderRealizadas();
}

// ── TABS ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-tab="'+tab+'"]').classList.add('active');
  ['posiciones','rentabilidad','historial','realizadas'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none';
  });
}

// ── CARTERA SWITCHER ──
function switchCartera(idx) {
  carteraActiva = idx;
  document.querySelectorAll('.cartera-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  renderAll();
}

// ── MODALES ──
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

function openActualizar() {
  const c = cartera();
  let html = '';
  c.posiciones.forEach((p,i) => {
    html += `<div class="form-row"><label>${p.ticker} — ${p.nombre}</label><input type="number" step="0.01" id="np-${i}" value="${p.precioActual}" inputmode="decimal"></div>`;
  });
  document.getElementById('precio-fields').innerHTML = html;
  document.getElementById('np-fecha').value = new Date().toISOString().slice(0,10);
  document.getElementById('overlay-actualizar').classList.add('open');
}

function guardarPrecios() {
  const c = cartera();
  c.posiciones.forEach((p,i) => {
    const v = parseFloat(document.getElementById('np-'+i).value);
    if (!isNaN(v) && v > 0) p.precioActual = v;
  });
  const fecha = document.getElementById('np-fecha').value;
  if (fecha) c.ultimaActualizacion = fecha;
  renderAll();
  closeOverlay('overlay-actualizar');
}

function openAportacion() {
  const c = cartera();
  document.getElementById('op-fecha').value = new Date().toISOString().slice(0,10);
  document.getElementById('op-venta-fecha').value = new Date().toISOString().slice(0,10);
  document.getElementById('op-venta-ticker').innerHTML = c.posiciones.map(p=>`<option value="${p.ticker}">${p.ticker} — ${p.nombre}</option>`).join('');
  document.getElementById('op-ticker').value = '';
  document.getElementById('op-nombre').value = '';
  document.getElementById('op-yahoo').value = '';
  document.getElementById('op-yahoo-row').style.display = 'block';
  document.getElementById('op-compra-fields').style.display = 'block';
  document.getElementById('op-venta-fields').style.display = 'none';
  document.getElementById('op-tipo').value = 'compra';
  document.getElementById('overlay-aportacion').classList.add('open');
}

function toggleOpTipo() {
  const t = document.getElementById('op-tipo').value;
  document.getElementById('op-compra-fields').style.display = t==='compra' ? 'block' : 'none';
  document.getElementById('op-venta-fields').style.display  = t==='venta'  ? 'block' : 'none';
}

function ejecutarOperacion() {
  const c = cartera();
  const tipo = document.getElementById('op-tipo').value;
  if (tipo === 'compra') {
    const ticker  = document.getElementById('op-ticker').value.trim().toUpperCase();
    const nombre  = document.getElementById('op-nombre').value.trim();
    const yahoo   = document.getElementById('op-yahoo').value.trim();
    const acciones= parseInt(document.getElementById('op-acciones').value);
    const precio  = parseFloat(document.getElementById('op-precio').value);
    const comision= parseFloat(document.getElementById('op-comision').value)||0;
    const fecha   = document.getElementById('op-fecha').value;
    if (!ticker||isNaN(acciones)||isNaN(precio)||acciones<=0||precio<=0) { alert('Rellena todos los campos.'); return; }
    const ex = c.posiciones.find(p=>p.ticker===ticker);
    if (ex) {
      const tot = ex.acciones + acciones;
      ex.precioMedio = (ex.acciones*ex.precioMedio + acciones*precio)/tot;
      ex.acciones = tot; ex.precioActual = precio;
      ex.comision = (ex.comision||0) + comision;
    } else {
      c.posiciones.push({ticker, nombre:nombre||ticker, acciones, precioMedio:precio, precioActual:precio, fechaCompra:fecha, comision});
      if (yahoo) state.yahooMap[ticker] = yahoo;
    }
    c.comisionesTotales += comision;
  } else {
    const ticker     = document.getElementById('op-venta-ticker').value;
    const accVenta   = parseInt(document.getElementById('op-venta-acc').value);
    const precioVenta= parseFloat(document.getElementById('op-venta-precio').value);
    const comision   = parseFloat(document.getElementById('op-venta-com').value)||0;
    const fecha      = document.getElementById('op-venta-fecha').value;
    if (isNaN(accVenta)||isNaN(precioVenta)||accVenta<=0||precioVenta<=0) { alert('Rellena todos los campos.'); return; }
    const pos = c.posiciones.find(p=>p.ticker===ticker);
    if (!pos) { alert('Posición no encontrada.'); return; }
    if (accVenta > pos.acciones) { alert('No puedes vender más de lo que tienes.'); return; }
    const benefNeto = (precioVenta - pos.precioMedio)*accVenta - comision;
    c.realizadas.push({ticker, nombre:pos.nombre, fecha, acciones:accVenta, precioCompra:pos.precioMedio, precioVenta, benefNeto});
    if (accVenta === pos.acciones) c.posiciones = c.posiciones.filter(p=>p.ticker!==ticker);
    else pos.acciones -= accVenta;
    c.comisionesTotales += comision;
  }
  c.ultimaActualizacion = new Date().toISOString().slice(0,10);
  renderAll();
  closeOverlay('overlay-aportacion');
}

function guardarSnapshot() {
  const c = cartera();
  const {coste, act, benef, pct} = calcTotales(c);
  const fecha = c.ultimaActualizacion, mes = fecha.slice(0,7);
  const idx = c.historial.findIndex(h=>h.fecha.slice(0,7)===mes);
  if (idx>=0) {
    if (!confirm('Ya existe snapshot para '+mes+'. ¿Sobreescribir?')) return;
    c.historial[idx] = {fecha, coste, valor:act, benef, pct};
  } else {
    c.historial.push({fecha, coste, valor:act, benef, pct});
  }
  renderAll();
  alert('✅ Snapshot del '+fecha+' guardado. Pulsa 💾 para descargar.');
}

function descargarArchivo() {
  const stateJson = JSON.stringify(state);
  let html = document.documentElement.outerHTML;
  html = html.replace(/var STATE = \{[\s\S]*?\};/, 'var STATE = '+stateJson+';');
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'carteras.html'; a.click();
  URL.revokeObjectURL(url);
}

// ── PRECIOS AUTO ──
function setStatus(msg, ok) {
  document.getElementById('status-txt').textContent = msg;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (ok===true?' ok': ok===false?' err':'');
}

async function fetchPrecio(symbol) {
  try {
    const r = await fetch('/.netlify/functions/precio?symbol=' + encodeURIComponent(symbol), {cache:'no-store'});
    if (r.ok) {
      const d = await r.json();
      if (d.price && d.price > 0) return d.price;
    }
  } catch {}
  return null;
}

async function actualizarPreciosAuto() {
  setStatus('⏳ Obteniendo precios…', null);
  const hoy = new Date().toISOString().slice(0,10);
  let ok=0, fail=0;
  const tareas = [];
  for (const c of state.carteras) {
    for (const pos of c.posiciones) {
      const sym = state.yahooMap[pos.ticker] || pos.ticker;
      tareas.push(
        fetchPrecio(sym).then(precio => {
          if (precio && precio > 0) { pos.precioActual = Math.round(precio*100)/100; ok++; }
          else fail++;
        })
      );
    }
    c.ultimaActualizacion = hoy;
  }
  await Promise.allSettled(tareas);
  renderAll();
  if (fail===0) setStatus('✅ Actualizado · '+hoy, true);
  else if (ok>0) setStatus('⚠️ '+ok+' ok, '+fail+' sin datos · '+hoy, null);
  else setStatus('❌ Sin conexión · precios anteriores', false);
}

// ── BIND EVENTS ──
function bindEvents() {
  document.getElementById('btn-auto').addEventListener('click', actualizarPreciosAuto);
  document.getElementById('btn-actualizar').addEventListener('click', openActualizar);
  document.getElementById('btn-aportacion').addEventListener('click', openAportacion);
  document.getElementById('btn-snapshot').addEventListener('click', guardarSnapshot);
  document.getElementById('btn-descargar').addEventListener('click', descargarArchivo);
  document.getElementById('btn-guardar-precios').addEventListener('click', guardarPrecios);
  document.getElementById('btn-cancelar-actualizar').addEventListener('click', ()=>closeOverlay('overlay-actualizar'));
  document.getElementById('btn-confirmar-op').addEventListener('click', ejecutarOperacion);
  document.getElementById('btn-cancelar-aportacion').addEventListener('click', ()=>closeOverlay('overlay-aportacion'));
  document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', ()=>switchTab(b.dataset.tab)));
  document.querySelectorAll('.cartera-btn').forEach(b => b.addEventListener('click', ()=>switchCartera(+b.dataset.cartera)));
  document.querySelectorAll('.overlay').forEach(o => o.addEventListener('click', e=>{ if(e.target===o) o.classList.remove('open'); }));
  document.getElementById('op-tipo').addEventListener('change', toggleOpTipo);
  document.getElementById('op-ticker').addEventListener('input', function() {
    const c = cartera();
    const val = this.value.trim().toUpperCase();
    const ex = c.posiciones.find(p=>p.ticker===val);
    document.getElementById('op-yahoo-row').style.display = ex ? 'none' : 'block';
    if (ex) document.getElementById('op-nombre').value = ex.nombre;
  });
}

// ── INIT ──
renderAll();
bindEvents();
state.carteras.forEach(c => c.ultimaActualizacion = new Date().toISOString().slice(0,10));
actualizarPreciosAuto();
</script>
